name: Build and Release App

on:
  push:
    tags:
      - v*.*.*

env: 
  GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
  GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
  GHCR_IMAGE_NAME: ghcr.io/chenglabresearch/ouroboros-server

jobs:
  publish-server-image:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        
      - name: Install Poetry
        uses: abatilo/actions-poetry@v2
        with:
          poetry-version: '2.1.3'

      - name: Install Dependencies
        working-directory: ./python
        run: poetry install

      - name: Build Wheel
        working-directory: ./python
        run: poetry build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push production server image
        uses: docker/build-push-action@v6
        with:
          context: ./python
          file: ./python/Dockerfile-prod
          push: true
          tags: |
            ${{ env.GHCR_IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.GHCR_IMAGE_NAME }}:latest

  release:
    needs: publish-server-image
    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v3

      - name: Package production server config (Mac or Linux)
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest'
        run: |
          mkdir -p ./extra-resources/server/
          cp ./python/compose.yml ./extra-resources/server/compose.yml
          printf 'OUROBOROS_SERVER_IMAGE=%s\nOUROBOROS_SERVER_TAG=%s\n' \
            '${{ env.GHCR_IMAGE_NAME }}' \
            '${{ github.ref_name }}' > ./extra-resources/server/.env

      - name: Package production server config (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          New-Item -Path ./extra-resources/server/ -ItemType Directory -Force
          Copy-Item -Path ./python/compose.yml -Destination ./extra-resources/server/compose.yml
          @(
            "OUROBOROS_SERVER_IMAGE=${{ env.GHCR_IMAGE_NAME }}",
            "OUROBOROS_SERVER_TAG=${{ github.ref_name }}"
          ) | Set-Content -Path ./extra-resources/server/.env
        shell: powershell

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: build-linux
        if: matrix.os == 'ubuntu-latest'
        run: npm run build:linux

      - name: build-mac
        if: matrix.os == 'macos-latest'
        run: npm run build:mac

      - name: build-win
        if: matrix.os == 'windows-latest'
        run: npm run build:win

      - name: release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          files: |
            dist/*.exe
            dist/*.zip
            dist/*.dmg
            dist/*.AppImage
            dist/*.snap
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
            dist/*.yml
            dist/*.blockmap
