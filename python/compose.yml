services:
  ouroboros-server:
    image: ${OUROBOROS_SERVER_IMAGE:-ghcr.io/chenglabresearch/ouroboros-server}:${OUROBOROS_SERVER_TAG:-latest}
    container_name: ouroboros-server
    ports:
      - '8000:8000'
    volumes:
      - ouroboros-volume:/volume
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OUR_ENV=docker
    shm_size: 64gb
volumes:
  ouroboros-volume:
    name: ouroboros-volume
